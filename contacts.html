<head>
  <meta charset="UTF-8"/>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="style.css" rel="stylesheet"/>
</head>
<body class="wf-public-body">

<input type="checkbox" id="navToggle" class="lp-nav-toggle-input"/>
<nav class="lp-nav" id="mainNav">
  <div class="lp-nav-inner">
    <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
      <span class="brand-icon"><i class="fa-solid fa-utensils"></i></span>
      <span class="brand-name">Hapag</span>
    </a>
    <label for="navToggle" class="lp-nav-burger" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </label>
    <div class="lp-nav-menu">
      <a href="index.html" class="lp-nav-link">Home</a>
      <a href="about.html" class="lp-nav-link">About</a>
      <a href="#menu" class="lp-nav-link">Menu</a>
      <a href="contacts.html" class="lp-nav-link active">Contact</a>
    </div>
  </div>
</nav>

<!-- MAIN CONTACT SECTION -->
<section class="wf-contact-section">
  <div class="container">
    <div class="row g-5">

      <!-- LEFT: Send Us A Message form -->
      <div class="col-lg-6">
        <h2 class="wf-contact-form-title">Send Us A Message</h2>
        <form action="thankyou.html" method="get">
          <div class="wf-form-group">
            <label class="wf-label">Name</label>
            <input type="text" name="name" class="wf-input" placeholder="Your Name" required/>
          </div>
          <div class="wf-form-group">
            <label class="wf-label">Email</label>
            <input type="email" name="email" class="wf-input" placeholder="Your email" required/>
          </div>
          <div class="wf-form-group">
            <label class="wf-label">Message</label>
            <textarea name="message" class="wf-input wf-textarea" placeholder="Your Message" required></textarea>
          </div>
          <button type="submit" class="wf-contact-send-btn">Send Message</button>
        </form>
      </div>

      <!-- RIGHT: Contact Information -->
      <div class="col-lg-6">
        <h2 class="wf-contact-info-title">Contact Information</h2>
        <div class="wf-contact-info-list">
          <div class="wf-contact-info-item">
            <i class="fa-solid fa-location-dot wf-ci-icon"></i>
            <div>
              <div class="wf-ci-label">About</div>
              <div class="wf-ci-value">123 San Pablo City</div>
            </div>
          </div>
          <div class="wf-contact-info-item">
            <i class="fa-solid fa-phone wf-ci-icon"></i>
            <div>
              <div class="wf-ci-label">Contact</div>
              <div class="wf-ci-value">09123456789</div>
            </div>
          </div>
          <div class="wf-contact-info-item">
            <i class="fa-solid fa-envelope wf-ci-icon"></i>
            <div>
              <div class="wf-ci-label">Email</div>
              <div class="wf-ci-value">info@restaurant.com</div>
            </div>
          </div>
          <div class="wf-contact-info-item">
            <i class="fa-regular fa-clock wf-ci-icon"></i>
            <div>
              <div class="wf-ci-label">Opening Hours</div>
              <div class="wf-ci-value">Mon – Sun 10:00 am – 10:00 pm</div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>

<!-- MAP PLACEHOLDER -->
<div class="wf-map-placeholder">
  <img src="map.jpg"
       alt="Location Map" class="wf-map-photo" />
  <div class="wf-map-pin"><i class="fa-solid fa-location-dot"></i></div>
</div>

<footer class="wf-simple-footer">

</footer>

</body>
</html>
