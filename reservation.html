  <meta charset="UTF-8"/>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="style.css" rel="stylesheet"/>
</head>
<body class="wf-dash-body">


<div class="wf-dash-wrapper">

  <!-- SIDEBAR — identical structure to dashboard -->
    <aside class="wf-sidebar">
    <div class="wf-sidebar-top">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index2.html">
        <span class="brand-icon"><i class="fa-solid fa-utensils"></i></span>
        <span class="brand-name">Hapag</span>
      </a>
    </div>
    <nav class="wf-sidebar-nav">
      <a href="dashboard.html" class="wf-sidebar-link">
        <i class="fa-solid fa-house"></i><span> Dashboard</span>
      </a>
      <a href="records.html" class="wf-sidebar-link">
        <i class="fa-regular fa-calendar"></i><span> Reservations</span>
      </a>
      <a href="reservation.html" class="wf-sidebar-link active">
        <i class="fa-solid fa-circle-plus"></i><span> Add Reservation</span>
      </a>
      <a href="about.html" class="wf-sidebar-link">
        <i class="fa-solid fa-circle-info"></i><span> About</span>
      </a>
      <a href="contacts.html" class="wf-sidebar-link">
        <i class="fa-solid fa-phone"></i><span> Contact</span>
      </a>
      <a href="login.html" class="wf-sidebar-link wf-sidebar-logout">
        <i class="fa-solid fa-right-from-bracket"></i><span> Logout</span>
      </a>
    </nav>
  </aside>

  <!-- MAIN -->
  <div class="wf-dash-main">

    <div class="wf-dash-topbar">
      <span class="wf-topbar-title">Add Reservation</span>
      <a href="login.html" class="wf-logout-btn">
        <i class="fa-solid fa-right-from-bracket"></i> Logout
      </a>
    </div>

    <div class="wf-dash-content">
      <h2 class="wf-resv-main-title">Make a Reservation</h2>
      <div class="wf-resv-underline"></div>

      <div class="wf-resv-card">
        <form action="thankyou.html" method="get">
          <div class="row g-4">
            <div class="col-md-6">
              <div class="wf-form-group">
                <label class="wf-label">Full name</label>
                <input type="text" name="fullname" class="wf-input" placeholder="Enter your name" required/>
              </div>
              <div class="wf-form-group">
                <label class="wf-label">Contact Number</label>
                <input type="tel" name="contact" class="wf-input" placeholder="Enter contact number" required pattern="[0-9]{11}" title="Enter 11-digit phone number"/>
              </div>
              <div class="wf-form-group">
                <label class="wf-label">Date</label>
                <input type="date" name="date" class="wf-input" required/>
              </div>
            </div>
            <div class="col-md-6">
              <div class="wf-form-group">
                <label class="wf-label">Time</label>
                <select name="time" class="wf-input wf-select" required>
                  <option value="">Choose time</option>
                  <option>11:00 AM</option>
                  <option>12:00 PM</option>
                  <option>1:00 PM</option>
                  <option>5:00 PM</option>
                  <option>6:00 PM</option>
                  <option>7:00 PM</option>
                  <option>7:30 PM</option>
                  <option>8:00 PM</option>
                </select>
              </div>
              <div class="wf-form-group">
                <label class="wf-label">Number of Guests</label>
                <input type="number" name="guests" class="wf-input" placeholder="Enter number of guests" min="1" max="20" required/>
              </div>
              <div class="wf-form-group">
                <label class="wf-label">Table Preference</label>
                <select name="table" class="wf-input wf-select">
                  <option value="">Select preference</option>
                  <option>Table 1 (Window, 2 pax)</option>
                  <option>Table 2 (Garden, 4 pax)</option>
                  <option>Table 3 (Indoor, 4 pax)</option>
                  <option>Table 4 (Private, 6 pax)</option>
                  <option>Table 5 (Indoor, 6 pax)</option>
                  <option>Table 6 (Outdoor, 4 pax)</option>
                  <option>Table 7 (Main Hall, 8 pax)</option>
                  <option>Table 8 (VIP Room, 10 pax)</option>
                </select>
              </div>
            </div>
          </div>
          <div class="wf-resv-submit-row">
            <button type="submit" class="wf-resv-submit-btn">Submit Reservation</button>
          </div>
        </form>
      </div>
    </div>

    <footer class="wf-simple-footer">
      &copy; 2024 Restaurant Reservation System, All rights reserved
    </footer>

</div><!-- /wf-dash-wrapper -->

    </a>
  </nav>
</body>
</html>
