<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Restaurant Reservation System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="style.css" rel="stylesheet"/>
</head>
<body class="wf-login-body">

<!-- NAVBAR: Logo left | Home right -->
<nav class="wf-login-nav">
  <div class="wf-login-nav-inner">
    <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
      <span class="brand-icon"><i class="fa-solid fa-utensils"></i></span>
      <span class="brand-name d-none d-sm-inline">Hapag</span>
    </a>
    <a href="index.html" class="wf-login-nav-link">Home</a>
  </div>
</nav>

<!-- MAIN: full grey background, centered card -->
<div class="wf-login-main">
  <div class="wf-login-card">
    <h2 class="wf-login-title">Login</h2>
    <div class="wf-login-underline"></div>

    <form action="dashboard.html" method="get">
      <div class="wf-form-group">
        <label class="wf-label">Username</label>
        <input type="text" name="username" class="wf-input" placeholder="Enter username" required/>
      </div>
      <div class="wf-form-group">
        <label class="wf-label">Password</label>
        <input type="password" name="password" class="wf-input" placeholder="Enter password" required/>
      </div>
      <button type="submit" class="wf-login-btn">Login</button>
    </form>

    <p class="wf-login-note">Don't have an account? Contact Admin</p>
  </div>
</div>

<!-- FOOTER -->
<footer class="wf-simple-footer">
  &copy; 2024 Restaurant Reservation System, All rights reserved
</footer>

</body>
</html>
